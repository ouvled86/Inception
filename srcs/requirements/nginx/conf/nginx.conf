server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name ${DOMAIN_NAME} _;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    root /var/www/html;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Bonus Adminer
    location = /adminer {
        proxy_pass http://adminer:8080/adminer.php;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location ^~ /adminer.php {
        proxy_pass http://adminer:8080/adminer.php;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /adminer/ {
        proxy_pass http://adminer:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Portfolio Routes
    location ^~ /portfolio/ {
        proxy_pass http://portfolio:80/;
        proxy_set_header Host $host;
    }
    location = /portfolio {
        return 301 /portfolio/;
    }

    location ^~ /static/ {
        proxy_pass http://portfolio:80/;
        proxy_set_header Host $host;
    }
    location = /static {
        return 301 /static/;
    }

    location ^~ /projects {
        proxy_pass http://portfolio:80/projects;
        proxy_set_header Host $host;
    }

    location ^~ /media {
        proxy_pass http://portfolio:80/media;
        proxy_set_header Host $host;
    }

    location ^~ /dashboard {
        proxy_pass http://portfolio:80/dashboard;
        proxy_set_header Host $host;
    }

    location ^~ /project/ {
        proxy_pass http://portfolio:80/project/;
        proxy_set_header Host $host;
    }

    location ^~ /api/ {
        proxy_pass http://portfolio:80/api/;
        proxy_set_header Host $host;
    }

    # Bonus Monitoring (cAdvisor)
    location /docker/ {
        proxy_pass http://monitoring:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /docker {
        return 301 /docker/;
    }
}
